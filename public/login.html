<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="appName">ChargeIt Hotel</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <!-- Remix Icons -->
  <link href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/light/style.css" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/login.css" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/images/mujer_isle%C3%B1a.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#F7F4EE">
</head>
<body>
  <div class="login-page">
    <section class="login-panel">
      <!-- Top bar: Theme + Language -->
      <div class="login-top-bar">
        <div class="theme-toggle-group" id="login-theme-switcher">
          <button class="theme-toggle-btn active" data-theme-mode="light" aria-label="Cambiar a modo claro" title="Cambiar a modo claro">
            <i class="ph-light ph-sun"></i>
          </button>
          <button class="theme-toggle-btn" data-theme-mode="dark" aria-label="Cambiar a modo oscuro" title="Cambiar a modo oscuro">
            <i class="ph-light ph-moon"></i>
          </button>
        </div>

        <div class="header-lang-group" id="login-lang-selector">
          <button class="header-lang-btn" data-lang="es">ES</button>
          <button class="header-lang-btn" data-lang="en">EN</button>
        </div>
      </div>

      <!-- Brand -->
      <div class="login-brand">
        <img src="/images/Logo_Nattivo_v1.png" alt="Nattivo Collection Hotel" class="login-brand-logo" />
        <div class="login-brand-silhouette"></div>
        <div class="login-brand-text">
          <span class="login-brand-name">Nattivo Collection Hotel</span>
          <span class="login-brand-sub" data-i18n="appName">ChargeIt Hotel</span>
        </div>
      </div>

      <!-- Header -->
      <header class="login-header">
        <h1 data-i18n="loginTitle">Iniciar sesión</h1>
        <p data-i18n="loginSubtitle">Ingresa con tu correo corporativo y contraseña.</p>
      </header>

      <!-- Form -->
      <form id="login-form" class="login-form">
        <div class="field">
          <label for="email" data-i18n="loginEmail">Correo electrónico</label>
          <div class="field-input-wrapper">
            <span class="field-icon"><i class="ph-light ph-envelope"></i></span>
            <input
              type="email"
              id="email"
              name="email"
              data-i18n-placeholder="loginEmailPlaceholder"
              placeholder="operador@nattivo.com"
              autocomplete="email"
              required
            />
            <span class="field-status" id="email-status">
              <i class="ph-light ph-check"></i>
            </span>
          </div>
        </div>

        <div class="field">
          <label for="password" data-i18n="loginPassword">Contraseña</label>
          <div class="field-input-wrapper">
            <span class="field-icon"><i class="ph-light ph-lock"></i></span>
            <input
              type="password"
              id="password"
              name="password"
              data-i18n-placeholder="loginPasswordPlaceholder"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="field-toggle" id="password-toggle">
              <i class="ph-light ph-eye-slash"></i>
            </button>
          </div>
        </div>

        <div class="login-options">
          <label class="checkbox">
            <input type="checkbox" id="remember" name="remember" />
            <span class="checkbox-box"><i class="ph-light ph-check"></i></span>
            <span data-i18n="loginRemember">Recordarme</span>
          </label>
          <button type="button" class="link-button" data-i18n="loginForgot">¿Olvidaste tu contraseña?</button>
        </div>

        <button type="submit" class="btn-primary" id="login-submit" data-i18n="loginButton">
          Ingresar
        </button>

        <div id="login-status" class="login-status"></div>
      </form>

      <div class="login-footer">
        <span data-i18n="loginNoAccount">¿No tienes cuenta?</span>
        <a href="/registro.html" class="link-button" data-i18n="loginCreateAccount">Crear cuenta</a>
      </div>
    </section>

    <section class="login-photo">
      <div class="photo-overlay"></div>
      <div class="photo-decoration">
        <div class="photo-wave"></div>
      </div>
      <div class="photo-caption">
        <div class="photo-caption-silhouette"></div>
        <h2>Nattivo Collection Hotel</h2>
        <p data-i18n="loginSubtitle">Ingresa con tu correo corporativo y contraseña.</p>
      </div>
    </section>
  </div>

  <!-- Preloader overlay -->
  <div id="loader-overlay" class="loader-overlay">
    <div class="loader-card">
      <img src="/images/Logo_Nattivo_v1.png" class="loader-logo" alt="Nattivo" />
      <div class="loader-spinner"></div>
      <p class="loader-text" data-i18n="loginLoading">Iniciando sesión en el minibar…</p>
    </div>
  </div>

  <script src="/js/theme.js" defer></script>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/login.js" defer></script>

  <script>
    (function() {
      var theme = localStorage.getItem("chargeit-theme") || "light";
      document.documentElement.setAttribute("data-theme", theme);

      var lang = localStorage.getItem("chargeit-lang") || "es";
      document.documentElement.setAttribute("lang", lang);

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    })();
  </script>
</body>
</html>
